<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老师工作台 - 乐造AI</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: #f8fafc; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { position: fixed; left: 0; top: 0; width: 240px; height: 100vh; background: white; border-right: 1px solid #e2e8f0; z-index: 100; display: flex; flex-direction: column; }
        .logo { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; }
        .logo-text { font-size: 18px; font-weight: 700; color: #1f2937; }
        .nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 8px; color: #4b5563; cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; margin-bottom: 4px; text-decoration: none; }
        .nav-item:hover { background: #f3f4f6; color: #1f2937; }
        .nav-item.active { background: #eff6ff; color: #2563eb; }
        .nav-item i { width: 18px; text-align: center; font-size: 15px; }
        .user-card { padding: 14px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-card:hover { background: #f3f4f6; }
        .user-avatar { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 600; color: #1f2937; }
        .user-role { font-size: 12px; color: #9ca3af; }
        
        /* Main */
        .main-content { margin-left: 240px; min-height: 100vh; background: #f8fafc; }
        .header { background: white; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .page-title { font-size: 18px; font-weight: 700; color: #1f2937; }
        
        /* Page */
        .page { display: none; padding: 24px; }
        .page.active { display: block; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; }
        .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 14px; }
        .stat-icon.blue { background: #eff6ff; color: #2563eb; }
        .stat-icon.green { background: #ecfdf5; color: #10b981; }
        .stat-icon.orange { background: #fff7ed; color: #f59e0b; }
        .stat-icon.purple { background: #f5f3ff; color: #8b5cf6; }
        .stat-value { font-size: 28px; font-weight: 700; color: #1f2937; margin-bottom: 4px; }
        .stat-label { font-size: 13px; color: #6b7280; }
        
        /* Card */
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 20px; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-size: 16px; font-weight: 600; color: #1f2937; }
        .card-body { padding: 20px; }
        
        /* Table */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 12px; font-size: 13px; color: #6b7280; font-weight: 500; border-bottom: 1px solid #e2e8f0; }
        .data-table td { padding: 12px; font-size: 14px; color: #4b5563; border-bottom: 1px solid #f3f4f6; }
        .data-table tr:hover { background: #f9fafb; }
        
        /* Button */
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #f3f4f6; color: #4b5563; }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-danger { background: #ef4444; color: white; }
        
        /* Form */
        .form-input { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #2563eb; }
        
        /* Badge */
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .badge-success { background: #ecfdf5; color: #10b981; }
        .badge-warning { background: #fff7ed; color: #f59e0b; }
        .badge-danger { background: #fef2f2; color: #ef4444; }
        
        /* Grid */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        /* Course Card */
        .course-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        .course-cover { height: 120px; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .course-info { padding: 16px; }
        .course-name { font-size: 15px; font-weight: 600; color: #1f2937; margin-bottom: 8px; }
        .course-meta { font-size: 12px; color: #6b7280; }
        
        @media (max-width: 1200px) { .grid-3 { grid-template-columns: repeat(2, 1fr); } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">🎓</div>
            <span class="logo-text">乐造AI</span>
        </div>
        <nav class="nav">
            <a href="#home" class="nav-item active" data-page="home" onclick="navigateTo('home'); window.location.hash='home'; return false;">
                <i class="fas fa-home"></i>
                <span>首页</span>
            </a>
            <a href="#students" class="nav-item" data-page="students" onclick="navigateTo('students'); window.location.hash='students'; return false;">
                <i class="fas fa-user-graduate"></i>
                <span>我的学生</span>
            </a>
            <a href="#courses" class="nav-item" data-page="courses" onclick="navigateTo('courses'); window.location.hash='courses'; return false;">
                <i class="fas fa-book"></i>
                <span>我的课程</span>
            </a>
            <a href="#homeworks" class="nav-item" data-page="homeworks" onclick="navigateTo('homeworks'); window.location.hash='homeworks'; return false;">
                <i class="fas fa-tasks"></i>
                <span>作业管理</span>
            </a>
            <a href="#works" class="nav-item" data-page="works" onclick="navigateTo('works'); window.location.hash='works'; return false;">
                <i class="fas fa-gamepad"></i>
                <span>作品审核</span>
            </a>
            <a href="#settings" class="nav-item" data-page="settings" onclick="navigateTo('settings'); window.location.hash='settings'; return false;">
                <i class="fas fa-cog"></i>
                <span>设置</span>
            </a>
        </nav>
        <div class="user-card" onclick="handleLogout()">
            <div class="user-avatar" id="user-avatar">老</div>
            <div class="user-info">
                <div class="user-name" id="user-name">老师</div>
                <div class="user-role">点击退出</div>
            </div>
            <i class="fas fa-sign-out-alt" style="color: #9ca3af;"></i>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <h1 class="page-title" id="page-title">首页</h1>
            <div>
                <button class="btn btn-secondary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> 刷新
                </button>
            </div>
        </header>
        
        <!-- Home Page -->
        <div id="page-home" class="page active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-user-graduate"></i></div>
                    <div class="stat-value" id="stat-students">0</div>
                    <div class="stat-label">我的学生</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-book"></i></div>
                    <div class="stat-value" id="stat-courses">0</div>
                    <div class="stat-label">课程数量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange"><i class="fas fa-tasks"></i></div>
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label">待审核作品</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-value" id="stat-approved">0</div>
                    <div class="stat-label">已通过作品</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">快捷操作</h3>
                </div>
                <div class="card-body" style="display: flex; gap: 16px;">
                    <button class="btn btn-primary" onclick="navigateTo('students'); window.location.hash='students';">
                        <i class="fas fa-user-plus"></i> 添加学生
                    </button>
                    <button class="btn btn-primary" onclick="navigateTo('homeworks'); window.location.hash='homeworks';">
                        <i class="fas fa-plus-circle"></i> 发布作业
                    </button>
                    <button class="btn btn-primary" onclick="navigateTo('works'); window.location.hash='works';">
                        <i class="fas fa-clipboard-check"></i> 审核作品
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Students Page -->
        <div id="page-students" class="page">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">我的学生</h3>
                    <button class="btn btn-primary" onclick="addStudent()">
                        <i class="fas fa-plus"></i> 添加学生
                    </button>
                </div>
                <div class="card-body" style="padding: 0;">
                    <input type="text" id="student-search" placeholder="搜索学生..." 
                           style="width: 100%; padding: 12px 20px; border: none; border-bottom: 1px solid #e2e8f0;"
                           onkeyup="filterStudents()">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>学生</th>
                                <th>用户名</th>
                                <th>班级</th>
                                <th>进度</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="students-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Courses Page -->
        <div id="page-courses" class="page">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">我的课程</h3>
                </div>
                <div class="card-body">
                    <div class="grid-3" id="courses-grid"></div>
                </div>
            </div>
        </div>
        
        <!-- Homeworks Page -->
        <div id="page-homeworks" class="page">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">作业管理</h3>
                    <button class="btn btn-primary" onclick="addHomework()">
                        <i class="fas fa-plus"></i> 发布作业
                    </button>
                </div>
                <div class="card-body" style="padding: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>作业标题</th>
                                <th>学生</th>
                                <th>类型</th>
                                <th>状态</th>
                                <th>提交时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="homeworks-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Works Page -->
        <div id="page-works" class="page">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">作品审核</h3>
                </div>
                <div class="card-body" style="padding: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>作品</th>
                                <th>学生</th>
                                <th>类型</th>
                                <th>状态</th>
                                <th>评分</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="works-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Settings Page -->
        <div id="page-settings" class="page">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">个人设置</h3>
                </div>
                <div class="card-body">
                    <div style="max-width: 500px;">
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px;">用户名</label>
                            <input type="text" id="setting-username" readonly class="form-input" style="background: #f9fafb;">
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px;">姓名</label>
                            <input type="text" id="setting-name" class="form-input">
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px;">新密码（留空不修改）</label>
                            <input type="password" id="setting-password" class="form-input" placeholder="请输入新密码">
                        </div>
                        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        let currentPage = 'home';
        
        // 导航
        function navigateTo(page) {
            currentPage = page;
            
            // 更新导航
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
            
            // 更新页面
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            // 更新标题
            const titles = { home: '首页', students: '我的学生', courses: '我的课程', homeworks: '作业管理', works: '作品审核', settings: '设置' };
            document.getElementById('page-title').textContent = titles[page] || '首页';
            
            // 加载数据
            loadPageData(page);
        }
        
        // 加载页面数据 - 使用后端 API
        async function loadPageData(page) {
            try {
                // 从后端获取数据
                const [coursesData, projectsData] = await Promise.all([
                    APIClient.courses.getTeacherCourses().catch(() => []),
                    APIClient.projects.getTeacherProjects().catch(() => [])
                ]);
                
                const students = LegacyAPI.students.list(); // 暂时使用本地数据
                const courses = coursesData.length ? coursesData : LegacyAPI.courses.list();
                const works = projectsData.length ? projectsData : LegacyAPI.works.list();
                
                switch(page) {
                    case 'home':
                        document.getElementById('stat-students').textContent = students.length;
                        document.getElementById('stat-courses').textContent = courses.length;
                        document.getElementById('stat-pending').textContent = works.filter(w => w.status === 'pending').length;
                        document.getElementById('stat-approved').textContent = works.filter(w => w.status === 'approved').length;
                        break;
                    case 'students':
                        renderStudents(students);
                        break;
                    case 'courses':
                        renderCourses(courses);
                        break;
                    case 'homeworks':
                        renderWorks(works, 'homeworks');
                        break;
                    case 'works':
                        renderWorks(works, 'works');
                        break;
                    case 'settings':
                        loadSettings();
                        break;
                }
            } catch (err) {
                console.error('加载数据失败:', err);
                // 降级到本地数据
                const students = LegacyAPI.students.list();
                const courses = LegacyAPI.courses.list();
                const works = LegacyAPI.works.list();
                
                document.getElementById('stat-students').textContent = students.length;
                document.getElementById('stat-courses').textContent = courses.length;
                document.getElementById('stat-pending').textContent = 0;
                document.getElementById('stat-approved').textContent = 0;
            }
        }
        
        // 渲染学生
        function renderStudents(students) {
            const tbody = document.getElementById('students-tbody');
            if (!students.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #6b7280;">暂无学生</td></tr>';
                return;
            }
            tbody.innerHTML = students.map(s => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #10b981, #34d399); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;">${(s.name || s.username || '学').charAt(0)}</div>
                            <span>${s.name || '-'}</span>
                        </div>
                    </td>
                    <td>${s.username}</td>
                    <td>${s.className || '-'}</td>
                    <td>${s.progress || 0}%</td>
                    <td><span class="badge badge-success">学习中</span></td>
                    <td>
                        <button class="btn btn-danger" style="padding: 4px 10px; font-size: 12px;" onclick="deleteStudent('${s.studentId}')">删除</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 渲染课程
        function renderCourses(courses) {
            const grid = document.getElementById('courses-grid');
            const icons = { scratch: '🎮', python: '🐍', web: '🌐', lego: '🧱' };
            if (!courses.length) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #6b7280;">暂无课程</p>';
                return;
            }
            grid.innerHTML = courses.map(c => `
                <div class="course-card">
                    <div class="course-cover">${icons[c.category] || '📚'}</div>
                    <div class="course-info">
                        <div class="course-name">${c.name}</div>
                        <div class="course-meta">
                            <span><i class="fas fa-clock"></i> ${c.duration || 0}课时</span>
                            <span><i class="fas fa-user"></i> ${c.teacherName || '乐造老师'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染作品
        function renderWorks(works, type) {
            const tbody = document.getElementById(type + '-tbody');
            if (!works.length) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: #6b7280;">暂无作品</td></tr>`;
                return;
            }
            tbody.innerHTML = works.map(w => `
                <tr>
                    <td>${w.title || '未命名'}</td>
                    <td>${w.studentName || '-'}</td>
                    <td>${w.type === 'scratch' ? '🎮 Scratch' : w.type === 'python' ? '🐍 Python' : '📝 其他'}</td>
                    <td>
                        <span class="badge ${w.status === 'approved' ? 'badge-success' : w.status === 'pending' ? 'badge-warning' : 'badge-danger'}">
                            ${w.status === 'approved' ? '已通过' : w.status === 'pending' ? '待审核' : '已拒绝'}
                        </span>
                    </td>
                    <td>${w.score || '-'}</td>
                    <td>
                        ${type === 'homeworks' ? `
                            <button class="btn btn-primary" style="padding: 4px 10px; font-size: 12px;" onclick="reviewWork('${w.workId}')">批改</button>
                        ` : `
                            <button class="btn btn-primary" style="padding: 4px 10px; font-size: 12px;" onclick="approveWork('${w.workId}')">通过</button>
                            <button class="btn btn-danger" style="padding: 4px 10px; font-size: 12px;" onclick="rejectWork('${w.workId}')">拒绝</button>
                        `}
                    </td>
                </tr>
            `).join('');
        }
        
        // 添加学生
        function addStudent() {
            const name = prompt('请输入学生姓名:');
            if (!name) return;
            const username = prompt('请输入用户名:');
            if (!username) return;
            const className = prompt('请输入班级:') || '默认班';
            
            API.students.create({
                studentId: 'student-' + Date.now(),
                username: username,
                name: name,
                className: className,
                progress: 0
            });
            
            alert('添加成功！');
            loadPageData('students');
        }
        
        // 删除学生
        function deleteStudent(id) {
            if (!confirm('确定删除？')) return;
            API.students.delete(id);
            loadPageData('students');
        }
        
        // 添加作业
        function addHomework() {
            const title = prompt('请输入作业标题:');
            if (!title) return;
            
            API.works.create({
                workId: 'work-' + Date.now(),
                title: title,
                type: 'scratch',
                status: 'pending',
                studentId: '',
                studentName: '',
                createdAt: Date.now()
            });
            
            alert('发布成功！');
            loadPageData('homeworks');
        }
        
        // 审核作品
        function approveWork(id) {
            const score = prompt('请输入评分 (0-100):', '90');
            const comment = prompt('请输入评语:') || '很好！';
            API.works.update(id, { status: 'approved', score: score || 90, comment: comment });
            alert('审核通过！');
            loadPageData('works');
        }
        
        // 拒绝作品
        function rejectWork(id) {
            const comment = prompt('请输入拒绝原因:') || '需要修改';
            API.works.update(id, { status: 'rejected', comment: comment });
            alert('已拒绝！');
            loadPageData('works');
        }
        
        // 批改作业
        function reviewWork(id) {
            const score = prompt('请输入评分 (0-100):', '90');
            const comment = prompt('请输入评语:') || '完成得很好！';
            API.works.update(id, { status: 'approved', score: score || 90, comment: comment });
            alert('批改完成！');
            loadPageData('homeworks');
        }
        
        // 搜索学生
        function filterStudents() {
            const keyword = document.getElementById('student-search').value.toLowerCase();
            const students = API.students.list().filter(s => 
                (s.name && s.name.toLowerCase().includes(keyword)) || 
                (s.username && s.username.toLowerCase().includes(keyword))
            );
            renderStudents(students);
        }
        
        // 加载设置 - 使用新的 API 客户端
        function loadSettings() {
            const user = Auth.getUser();
            document.getElementById('setting-username').value = user?.username || '';
            document.getElementById('setting-name').value = user?.nickname || '';
        }
        
        // 保存设置
        function saveSettings() {
            const name = document.getElementById('setting-name').value;
            const password = document.getElementById('setting-password').value;
            
            alert('设置已保存！');
        }
        
        // 退出登录 - 使用新的 API 客户端
        function handleLogout() {
            Auth.clearAuth();
            window.location.href = 'index.html';
        }
        
        // 初始化 - 使用新的 API 客户端
        window.onload = function() {
            if (!Auth.isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }
            
            const user = Auth.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            if (user.role !== 'teacher') {
                if (user.role === 'admin') window.location.href = 'admin-dashboard.html';
                else window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('user-name').textContent = user.nickname || user.username;
            document.getElementById('user-avatar').textContent = (user.nickname || user.username).charAt(0);
            
            // 处理hash
            const hash = window.location.hash.slice(1) || 'home';
            navigateTo(hash);
        };
    </script>
